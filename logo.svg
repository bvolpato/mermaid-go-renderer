<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440" width="400" height="440">
  <defs>
    <linearGradient id="tailGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#67D8EF"/>
      <stop offset="100%" stop-color="#4AB8D1"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="rockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>
    <linearGradient id="finGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <radialGradient id="scaleShine" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Water waves -->
  <path d="M 30 370 Q 70 350, 110 370 Q 150 390, 190 370 Q 230 350, 270 370 Q 310 390, 350 370 Q 370 360, 380 370 L 380 440 L 30 440 Z" fill="url(#waterGrad)" opacity="0.6"/>
  <path d="M 20 385 Q 60 365, 100 385 Q 140 405, 180 385 Q 220 365, 260 385 Q 300 405, 340 385 Q 360 375, 390 385 L 390 440 L 20 440 Z" fill="#0EA5E9" opacity="0.25"/>

  <!-- Rock -->
  <path d="M 120 340 Q 100 350, 90 380 Q 85 400, 100 410 Q 130 425, 200 420 Q 270 425, 300 410 Q 315 400, 310 380 Q 300 350, 280 340 Q 240 320, 200 325 Q 160 320, 120 340 Z" fill="url(#rockGrad)" stroke="#475569" stroke-width="2"/>
  <ellipse cx="150" cy="375" rx="12" ry="8" fill="#78909C" opacity="0.4"/>
  <ellipse cx="260" cy="380" rx="10" ry="6" fill="#78909C" opacity="0.3"/>

  <!-- Mermaid tail -->
  <path d="M 200 260 Q 190 300, 210 330 Q 230 360, 260 380 Q 280 395, 310 390 Q 320 388, 330 380" fill="url(#tailGrad)" stroke="#0D9488" stroke-width="2.5"/>
  <!-- Tail fin -->
  <path d="M 310 390 Q 340 370, 360 345 Q 365 340, 355 338 Q 340 340, 330 355 Q 328 360, 330 380 Q 335 395, 355 405 Q 365 408, 360 400 Q 345 395, 330 380 L 310 390 Z" fill="url(#finGrad)" stroke="#0D9488" stroke-width="1.5"/>

  <!-- Scale pattern on tail -->
  <path d="M 200 275 Q 195 285, 205 290" fill="none" stroke="#5EEAD4" stroke-width="1" opacity="0.6"/>
  <path d="M 210 275 Q 205 285, 215 290" fill="none" stroke="#5EEAD4" stroke-width="1" opacity="0.6"/>
  <path d="M 205 290 Q 200 300, 210 305" fill="none" stroke="#5EEAD4" stroke-width="1" opacity="0.5"/>
  <path d="M 215 290 Q 210 300, 220 305" fill="none" stroke="#5EEAD4" stroke-width="1" opacity="0.5"/>
  <path d="M 215 305 Q 215 315, 225 320" fill="none" stroke="#5EEAD4" stroke-width="1" opacity="0.4"/>
  <path d="M 225 320 Q 230 335, 245 345" fill="none" stroke="#5EEAD4" stroke-width="1" opacity="0.3"/>
  <path d="M 220 310 Q 220 320, 230 325" fill="none" stroke="#5EEAD4" stroke-width="1" opacity="0.4"/>

  <!-- Gopher body -->
  <ellipse cx="200" cy="200" rx="75" ry="95" fill="url(#bodyGrad)" stroke="#3BA4BB" stroke-width="2.5"/>
  <!-- Belly -->
  <ellipse cx="200" cy="220" rx="50" ry="60" fill="#B2EBF2" opacity="0.5"/>

  <!-- Ears -->
  <ellipse cx="155" cy="95" rx="22" ry="28" fill="#4AB8D1" stroke="#3BA4BB" stroke-width="2" transform="rotate(-10, 155, 95)"/>
  <ellipse cx="155" cy="95" rx="12" ry="18" fill="#FFCCBC" transform="rotate(-10, 155, 95)"/>
  <ellipse cx="245" cy="95" rx="22" ry="28" fill="#4AB8D1" stroke="#3BA4BB" stroke-width="2" transform="rotate(10, 245, 95)"/>
  <ellipse cx="245" cy="95" rx="12" ry="18" fill="#FFCCBC" transform="rotate(10, 245, 95)"/>

  <!-- Head -->
  <ellipse cx="200" cy="130" rx="65" ry="55" fill="url(#bodyGrad)" stroke="#3BA4BB" stroke-width="2.5"/>

  <!-- Eyes - big classic gopher eyes -->
  <ellipse cx="178" cy="120" rx="22" ry="24" fill="white" stroke="#3BA4BB" stroke-width="1.5"/>
  <ellipse cx="222" cy="120" rx="22" ry="24" fill="white" stroke="#3BA4BB" stroke-width="1.5"/>
  <circle cx="182" cy="118" r="11" fill="#263238"/>
  <circle cx="226" cy="118" r="11" fill="#263238"/>
  <circle cx="185" cy="114" r="4" fill="white"/>
  <circle cx="229" cy="114" r="4" fill="white"/>

  <!-- Nose -->
  <ellipse cx="200" cy="140" rx="8" ry="5" fill="#37474F"/>

  <!-- Teeth -->
  <rect x="192" y="150" width="7" height="10" rx="1.5" fill="white" stroke="#B0BEC5" stroke-width="0.8"/>
  <rect x="201" y="150" width="7" height="10" rx="1.5" fill="white" stroke="#B0BEC5" stroke-width="0.8"/>

  <!-- Smile lines -->
  <path d="M 185 148 Q 200 162, 215 148" fill="none" stroke="#37474F" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left arm holding trident -->
  <path d="M 135 195 Q 110 180, 100 150 Q 95 140, 100 135" fill="none" stroke="#4AB8D1" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="100" cy="135" rx="8" ry="8" fill="#4AB8D1"/>

  <!-- Trident -->
  <line x1="80" y1="50" x2="80" y2="160" stroke="#CFB53B" stroke-width="4" stroke-linecap="round"/>
  <path d="M 80 50 L 80 35 L 75 30 L 80 20 L 85 30 L 80 35" fill="#CFB53B" stroke="#B8971E" stroke-width="1"/>
  <path d="M 80 50 L 65 35 L 60 30 L 60 20" fill="none" stroke="#CFB53B" stroke-width="3" stroke-linecap="round"/>
  <path d="M 80 50 L 95 35 L 100 30 L 100 20" fill="none" stroke="#CFB53B" stroke-width="3" stroke-linecap="round"/>
  <circle cx="60" cy="18" r="3" fill="#E8D44D"/>
  <circle cx="80" cy="18" r="3" fill="#E8D44D"/>
  <circle cx="100" cy="18" r="3" fill="#E8D44D"/>

  <!-- Right arm holding flowchart -->
  <path d="M 265 195 Q 290 180, 305 170 Q 310 165, 310 160" fill="none" stroke="#4AB8D1" stroke-width="12" stroke-linecap="round"/>
  <ellipse cx="310" cy="160" rx="8" ry="8" fill="#4AB8D1"/>

  <!-- Flowchart clipboard -->
  <rect x="290" y="60" width="80" height="105" rx="6" fill="white" stroke="#90A4AE" stroke-width="2"/>
  <rect x="315" y="55" width="30" height="12" rx="4" fill="#78909C"/>

  <!-- Flowchart nodes -->
  <!-- Start node -->
  <rect x="313" y="75" width="35" height="14" rx="7" fill="#4CAF50" stroke="#388E3C" stroke-width="1"/>
  <text x="330" y="86" text-anchor="middle" font-size="7" font-weight="bold" fill="white" font-family="Arial, sans-serif">START</text>

  <!-- Process box -->
  <rect x="310" y="97" width="40" height="14" rx="2" fill="#42A5F5" stroke="#1E88E5" stroke-width="1"/>
  <text x="330" y="107" text-anchor="middle" font-size="6" fill="white" font-family="Arial, sans-serif">Process</text>

  <!-- Diamond decision -->
  <polygon points="330,120 345,130 330,140 315,130" fill="#FFA726" stroke="#F57C00" stroke-width="1"/>
  <text x="330" y="133" text-anchor="middle" font-size="5" fill="white" font-family="Arial, sans-serif">If?</text>

  <!-- End node -->
  <rect x="313" y="148" width="35" height="14" rx="7" fill="#EF5350" stroke="#D32F2F" stroke-width="1"/>
  <text x="330" y="158" text-anchor="middle" font-size="7" font-weight="bold" fill="white" font-family="Arial, sans-serif">END</text>

  <!-- Flowchart arrows -->
  <line x1="330" y1="89" x2="330" y2="97" stroke="#546E7A" stroke-width="1.2"/>
  <line x1="330" y1="111" x2="330" y2="120" stroke="#546E7A" stroke-width="1.2"/>
  <line x1="330" y1="140" x2="330" y2="148" stroke="#546E7A" stroke-width="1.2"/>
  <!-- Arrow heads -->
  <polygon points="328,97 330,94 332,97" fill="#546E7A"/>
  <polygon points="328,120 330,117 332,120" fill="#546E7A"/>
  <polygon points="328,148 330,145 332,148" fill="#546E7A"/>

  <!-- Shell necklace detail -->
  <path d="M 185 175 Q 200 180, 215 175" fill="none" stroke="#80DEEA" stroke-width="1.5"/>
  <circle cx="192" cy="177" r="3" fill="#B2EBF2" stroke="#4DD0E1" stroke-width="0.8"/>
  <circle cx="200" cy="179" r="3.5" fill="#B2EBF2" stroke="#4DD0E1" stroke-width="0.8"/>
  <circle cx="208" cy="177" r="3" fill="#B2EBF2" stroke="#4DD0E1" stroke-width="0.8"/>

  <!-- Water splash details -->
  <circle cx="105" cy="395" r="3" fill="#7DD3FC" opacity="0.6"/>
  <circle cx="295" cy="385" r="2.5" fill="#7DD3FC" opacity="0.5"/>
  <circle cx="320" cy="375" r="2" fill="#7DD3FC" opacity="0.4"/>
  <path d="M 85 385 Q 80 375, 75 380" fill="none" stroke="#7DD3FC" stroke-width="1.5" opacity="0.5"/>
  <path d="M 320 370 Q 325 360, 330 365" fill="none" stroke="#7DD3FC" stroke-width="1.5" opacity="0.4"/>
</svg>
